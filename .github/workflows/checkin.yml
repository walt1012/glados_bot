name: glados-checkin-for-http

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron:  45 23,9 * * *

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Install Python
      run: |
        sudo apt update && \
        sudo apt install python3
      
    - name: requirements
      run: |
        pip3 install -r requirements.txt
        pip3 install cloudscraper
        
    - name: Checkin
      run: |
        python3 checkin.py 
      env: 
        COOKIE1: ${{ secrets.COOKIE1 }}
        COOKIE2: ${{ secrets.COOKIE2 }}
#         SCKEY: ${{ secrets.SCKEY }}
